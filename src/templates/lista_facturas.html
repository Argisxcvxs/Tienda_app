<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Facturas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        /* Colores y estilos personalizados */
        body {
            font-family: 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
        }

        header {
            background-color: #2c3e50; /* Azul oscuro */
            color: white;
            padding: 10px 0;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        header nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 0 20px;
        }

        header nav a {
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            padding: 10px 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header nav a:hover {
            background-color: #34495e; /* Azul grisáceo */
            border-radius: 4px;
        }

        main {
            margin-top: 80px; /* Espacio debajo del header fijo */
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
            background-color: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        table thead {
            background-color: #2c3e50; /* Azul oscuro */
            color: white;
            text-align: left;
        }

        table th, table td {
            padding: 1rem;
            border-bottom: 1px solid #ddd;
        }

        table tbody tr:hover {
            background-color: #f1f1f1;
        }

        table tbody tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="/admin">Panel de Administración</a>
        </nav>
    </header>
    <main>
        <h1>Facturas</h1>
        <table>
            <thead>
                <tr>
                    <th>ID Factura</th>
                    <th>ID Venta</th>
                    <th>Fecha de Emisión</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                {% for factura in facturas %}
                <tr>
                    <td>{{ factura.id_factura }}</td>
                    <td>{{ factura.id_venta }}</td>
                    <td>{{ factura.fecha_emision }}</td>
                    <td>${{ "%.2f" | format(factura.total) }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
</body>
</html>
